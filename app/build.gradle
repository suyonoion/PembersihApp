plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'com.pembersih.app'
    compileSdk 33

    defaultConfig {
        applicationId "com.pembersih.app"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.9.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
